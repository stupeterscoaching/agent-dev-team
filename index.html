<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Web Calculator</title><link rel="stylesheet" href="style.css"></head><body><div class="calculator"> <input type="number" id="num1" placeholder="Enter first number"><button onclick="calculate(1, document.getElementById("num1").value)" value="+">+</button> <input type="number" id="num2" placeholder="Enter second number"><button onclick="calculate(2, document.getElementById("num2").value)" value="-">-</button> <input type="number" id="result" placeholder="Result"> <button onclick="calculate(3, "")">=</button> </div> <script src="app.js"></script></body></html>
